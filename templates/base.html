<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/chessboard-1.0.0.css">
</head>

<body>
<header>
    <a href="/" class="header-logo">Blog</a>
    <input type="checkbox" id="menu-toggle" hidden="">
    <label class="hamburger" for="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </label>
</header>

<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/" class="logo">Blog</a>
        </div>
        <div class="sidebar-body">
            <nav>
                <ul>
                    {% for item in menu %}
                    <li><a href="{{ item.path }}">{{ item.label }}</a></li>
                    {% endfor %}
                </ul>
            </nav>
            <div class="sidebar-bottom">
                {% if logged_in %}
                <span class="sidebar-admin-title">Admin</span>
                <a href="/admin/stranky">Pages</a>
                <a href="/admin/tagy">Tags</a>
                <a href="/admin/obrazky">Images</a>
                <a href="/admin/galerie">Galleries</a>
                <a href="/admin/menu">Menu</a>
                <a href="/admin/tokeny">Tokens</a>
                <a href="/admin/logout">Logout</a>
                {% else %}
                <a href="/admin/login">Login</a>
                {% endif %}
            </div>
        </div>
    </aside>

    <div class="content">
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer>&copy; Blog</footer>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/static/js/chessboard-1.0.0.js"></script>
<script type="module" src="/static/js/chess-viewer.js"></script>
<script>
    document.getElementById('menu-toggle').addEventListener('change', function () {
        document.getElementById('sidebar').classList.toggle('open', this.checked);
    });
</script>
</body>

</html>
