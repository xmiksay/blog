{% extends "base.html" %}
{% block title %}Edit menu item{% endblock %}
{% block content %}
<div class="admin-form">
    <h1>Edit: {{ item.title }}</h1>

    <form method="POST" action="/admin/menu/{{ item.id }}">
        <label for="title">Title *</label>
        <input id="title" name="title" type="text" required value="{{ item.title }}">

        <label for="path">Path <small>(empty = index page)</small></label>
        <input id="path" name="path" type="text" value="{{ item.path }}">

        <label for="markdown">Markdown content</label>
        <textarea id="markdown" name="markdown" rows="5">{{ item.markdown }}</textarea>

        <label for="order_index">Order</label>
        <input id="order_index" name="order_index" type="number" value="{{ item.order_index }}" min="0">

        <div class="form-actions">
            <button type="submit">Save</button>
            <a href="/admin/menu">Back</a>
        </div>
    </form>
</div>
{% endblock %}
