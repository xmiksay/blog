{% extends "base.html" %}
{% block title %}Edit tag{% endblock %}
{% block content %}
<div class="admin-form">
    <h1>Edit: {{ tag.name }}</h1>

    <form method="POST" action="/admin/tagy/{{ tag.id }}">
        <label for="name">Name *</label>
        <input id="name" name="name" type="text" required value="{{ tag.name }}">

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="2">{{ tag.description | default('') }}</textarea>

        <div class="form-actions">
            <button type="submit">Save</button>
            <a href="/admin/tagy">Back</a>
        </div>
    </form>
</div>
{% endblock %}
