{% extends "base.html" %}
{% block title %}Edit image{% endblock %}
{% block content %}
<div class="admin-form">
    <h1>Edit: {{ image.title }}</h1>

    <div style="margin-bottom:1rem">
        <img src="/obrazky/{{ image.id }}/nahled" alt="{{ image.title }}" style="max-height:200px">
    </div>

    <form method="POST" action="/admin/obrazky/{{ image.id }}">
        <label for="title">Title *</label>
        <input id="title" name="title" type="text" required value="{{ image.title }}">

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="3">{{ image.description | default('') }}</textarea>

        <p><small>Embed tag: <code>[img {{ image.id }}]</code></small></p>

        <div class="form-actions">
            <button type="submit">Save</button>
            <a href="/admin/obrazky">Back</a>
        </div>
    </form>
</div>
{% endblock %}
