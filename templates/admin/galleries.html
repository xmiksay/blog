{% extends "base.html" %}
{% block title %}Admin – Galleries{% endblock %}
{% block content %}
<div class="admin-dashboard">
    <h1>Galleries <a href="/admin/galerie/nova" class="btn-small">+ New</a></h1>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Images</th>
                <th>Tag</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for g in galleries %}
            <tr>
                <td>{{ g.title }}</td>
                <td>{{ g.image_count }}</td>
                <td><code>[gallery {{ g.id }}]</code></td>
                <td>{{ g.created_at }}</td>
                <td>
                    <a href="/admin/galerie/{{ g.id }}/edit" class="btn btn-small">Edit</a>
                    <form method="POST" action="/admin/galerie/{{ g.id }}/smazat" style="display:inline">
                        <button type="submit" class="btn btn-small" onclick="return confirm('Delete gallery?')">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
