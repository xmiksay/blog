{% extends "base.html" %}
{% block title %}Admin – Tags{% endblock %}
{% block content %}
<div class="admin-form">
    <h1>Tags</h1>

    <table>
        <thead><tr><th>ID</th><th>Name</th><th>Description</th><th>Actions</th></tr></thead>
        <tbody>
        {% for t in tags %}
        <tr>
            <td>{{ t.id }}</td>
            <td>{{ t.name }}</td>
            <td>{{ t.description | default("-") }}</td>
            <td>
                <a href="/admin/tagy/{{ t.id }}/edit" class="btn btn-small">Edit</a>
                <form method="POST" action="/admin/tagy/{{ t.id }}/smazat" style="display:inline">
                    <button type="submit" class="btn btn-small" onclick="return confirm('Delete?')">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>

    <h2>Add tag</h2>
    <form method="POST" action="/admin/tagy">
        <label for="name">Name *</label>
        <input id="name" name="name" type="text" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="2"></textarea>

        <div class="form-actions">
            <button type="submit">Add</button>
        </div>
    </form>
</div>
{% endblock %}
