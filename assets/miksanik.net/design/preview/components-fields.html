<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-0);font-family:var(--font-body);display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:6px;display:block}
  input[type=text],input[type=search],input[type=password],textarea{width:100%;padding:8px 10px;background:var(--bg-3);border:1px solid var(--line-1);border-radius:var(--r-2);color:var(--fg-0);font-family:var(--font-body);font-size:14px;outline:none;transition:all .15s}
  input:focus,textarea:focus{border-color:var(--acc-blue);box-shadow:0 0 0 2px rgba(59,130,246,.2)}
  textarea{font-family:var(--font-mono);font-size:13px;min-height:60px;resize:vertical}
  input::placeholder{color:var(--fg-3)}
  .group{display:flex;flex-direction:column;gap:6px}
</style></head><body>
  <div class="group">
    <span class="label">// search</span>
    <input type="search" placeholder="Hledat poznámky…">
  </div>
  <div class="group">
    <span class="label">// title</span>
    <input type="text" value="Rust async pinning">
  </div>
  <div class="group" style="grid-column:1/-1">
    <span class="label">// markdown body</span>
    <textarea>## Pinning

::page{path=/notes/pin}

A `Pin&lt;P&gt;` guarantees…</textarea>
  </div>
</body></html>
