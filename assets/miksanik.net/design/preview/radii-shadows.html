<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii & shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-mono);display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:12px}
  .grid{display:flex;gap:12px;flex-wrap:wrap}
  .box{width:80px;height:80px;background:var(--bg-1);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--fg-0)}
  .lbl{font-size:10px;color:var(--fg-2);margin-top:4px;text-align:center}
</style></head><body>
  <div>
    <div class="label">// radii (small)</div>
    <div class="grid">
      <div><div class="box" style="border:1px solid var(--line-1);border-radius:2px">2</div><div class="lbl">--r-1</div></div>
      <div><div class="box" style="border:1px solid var(--line-1);border-radius:4px">4</div><div class="lbl">--r-2</div></div>
      <div><div class="box" style="border:1px solid var(--line-1);border-radius:8px">8</div><div class="lbl">--r-3</div></div>
      <div><div class="box" style="border:1px solid var(--acc-red-bd);border-radius:999px;background:var(--acc-red-bg);color:var(--acc-red)">REC</div><div class="lbl">pill (rare)</div></div>
    </div>
  </div>
  <div>
    <div class="label">// shadows / halos</div>
    <div class="grid">
      <div><div class="box" style="box-shadow:var(--shadow-flat);border-radius:4px">flat</div><div class="lbl">flat</div></div>
      <div><div class="box" style="box-shadow:var(--shadow-card);border-radius:4px">card</div><div class="lbl">card</div></div>
      <div><div class="box" style="box-shadow:var(--halo-violet);border-radius:4px;color:var(--acc-violet)">halo</div><div class="lbl">violet</div></div>
      <div><div class="box" style="box-shadow:var(--halo-green);border-radius:4px;color:var(--acc-green)">ok</div><div class="lbl">green</div></div>
    </div>
  </div>
</body></html>
