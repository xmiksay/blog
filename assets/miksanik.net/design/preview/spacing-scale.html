<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-mono)}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:12px}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:6px;font-size:12px}
  .name{width:48px;color:var(--fg-0)}
  .px{width:48px;color:var(--fg-2)}
  .bar{height:14px;background:var(--acc-violet);border-radius:1px;box-shadow:0 0 12px rgba(139,92,246,.25)}
</style></head><body>
  <div class="label">// 4px scale · spacing tokens</div>
  <div class="row"><span class="name">--s-1</span><span class="px">4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="name">--s-2</span><span class="px">8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="name">--s-3</span><span class="px">12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="name">--s-4</span><span class="px">16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="name">--s-5</span><span class="px">24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="name">--s-6</span><span class="px">32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="name">--s-7</span><span class="px">48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="name">--s-8</span><span class="px">64px</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="name">--s-9</span><span class="px">96px</span><div class="bar" style="width:96px"></div></div>
</body></html>
