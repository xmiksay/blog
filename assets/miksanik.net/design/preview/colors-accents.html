<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Colors — accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-0);font-family:var(--font-mono);color:var(--fg-1)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border:1px solid var(--line-1);border-radius:var(--r-2);padding:12px;display:flex;flex-direction:column;gap:8px;min-height:120px;background:var(--bg-1)}
  .chip{height:44px;border-radius:var(--r-1)}
  .name{font-size:12px;color:var(--fg-0);font-weight:600}
  .hex{font-size:10px;color:var(--fg-2)}
  .pill{display:inline-block;padding:2px 8px;font-size:10px;border-radius:var(--r-1)}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:8px}
</style></head><body>
  <div class="label">// signal accents — calibrated for white bg</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#DC2638"></div><div class="name">red · live</div><div class="hex">#DC2638</div><span class="pill" style="background:var(--acc-red-bg);border:1px solid var(--acc-red-bd);color:var(--acc-red)">REC</span></div>
    <div class="sw"><div class="chip" style="background:#2563EB"></div><div class="name">blue · link</div><div class="hex">#2563EB</div><span class="pill" style="background:var(--acc-blue-bg);border:1px solid var(--acc-blue-bd);color:var(--acc-blue)">info</span></div>
    <div class="sw"><div class="chip" style="background:#7C3AED"></div><div class="name">violet · brand</div><div class="hex">#7C3AED</div><span class="pill" style="background:var(--acc-violet-bg);border:1px solid var(--acc-violet-bd);color:var(--acc-violet)">partie</span></div>
    <div class="sw"><div class="chip" style="background:#4F46E5"></div><div class="name">indigo · 2°</div><div class="hex">#4F46E5</div><span class="pill" style="background:var(--acc-indigo-bg);border:1px solid var(--acc-indigo-bd);color:var(--acc-indigo)">tag</span></div>
    <div class="sw"><div class="chip" style="background:#059669"></div><div class="name">green · ok</div><div class="hex">#059669</div><span class="pill" style="background:var(--acc-green-bg);border:1px solid var(--acc-green-bd);color:var(--acc-green)">ok</span></div>
  </div>
</body></html>
