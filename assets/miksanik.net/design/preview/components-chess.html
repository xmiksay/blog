<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Chess viewer</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-0);font-family:var(--font-body);display:flex;gap:24px;align-items:flex-start}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:10px}
  .pgn-viewer{display:flex;flex-direction:column;gap:8px}
  /* Černobílá šachovnice */
  .board{display:grid;grid-template-columns:repeat(8,42px);grid-template-rows:repeat(8,42px);border:1px solid var(--line-2);box-shadow:0 0 0 1px rgba(124,58,237,.20),0 6px 18px rgba(11,15,20,.10)}
  .sq{display:flex;align-items:center;justify-content:center;position:relative}
  .sq.l{background:#FFFFFF}
  .sq.d{background:#0B0F14}
  .sq.hl::before{content:"";position:absolute;inset:0;background:rgba(124,58,237,.32);pointer-events:none;z-index:2}
  .sq svg{width:38px;height:38px;display:block;position:relative;z-index:1}
  .controls{display:flex;align-items:center;gap:6px}
  .controls button{background:var(--bg-1);border:1px solid var(--line-1);color:var(--fg-1);font-family:var(--font-mono);padding:4px 8px;border-radius:var(--r-1);cursor:pointer;font-size:13px}
  .controls button:hover{border-color:var(--line-2);color:var(--fg-0);background:var(--bg-2)}
  .move-info{font-family:var(--font-mono);font-size:12px;color:var(--acc-violet);min-width:80px;text-align:center}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);text-align:center}
  .legend{display:flex;gap:14px;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:6px;justify-content:center}
</style></head><body>
  <div>
    <div class="label">// ::pgn — partie viewer</div>
    <div class="pgn-viewer">
      <div class="board" id="b"></div>
      <div class="controls"><button>⏮</button><button>◀</button><span class="move-info">12. Nf3</span><button>▶</button><button>⏭</button></div>
      <div class="meta">Karjakin – Carlsen · 2016 · 1–0</div>
      <div class="legend">
        <span style="color:#5C6773">■ --fg-2 · obrys (oba)</span>
      </div>
    </div>
  </div>
  <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);max-width:240px;line-height:1.6">
    Šachovnice: <strong style="color:var(--fg-0)">černobílá</strong>.<br>
    Výplň figurek: <strong style="color:var(--fg-0)">černobílá</strong>.<br>
    Obrys figurek: <strong style="color:#5C6773">--fg-2</strong> (šedý, oba).<br><br>
    Tvary blízké klasickým<br>
    Staunton siluetám —<br>
    pěšec, věž, jezdec,<br>
    střelec, dáma, král.
  </div>
<script>
  // Recognizable Staunton-style silhouettes (45×45 viewBox).
  // Adapted/simplified from the public-domain Wikimedia Cburnett SVG set
  // — same shapes used by lichess and chessboard.js.
  const PATHS = {
    p: 'M22 9c-2.21 0-4 1.79-4 4 0 .89.29 1.71.78 2.38C17.33 16.5 16 18.59 16 21c0 2.03 .94 3.84 2.41 5.03-3 1.06-7.41 5.55-7.41 13.47h23c0-7.92-4.41-12.41-7.41-13.47C28.06 24.84 29 23.03 29 21c0-2.41-1.33-4.5-2.78-5.62.49-.67.78-1.49.78-2.38 0-2.21-1.79-4-4-4z',
    r: 'M9 39h27v-3H9zM12 36v-4h21v4zM11 14V9h4v2h5V9h5v2h5V9h4v5zM34 14l-3 3H14l-3-3zM31 17v12.5H14V17zM31 29.5l1.5 2.5h-18l1.5-2.5z',
    n: 'M22 10c10.5 1 16.5 8 16 29H15c0-9 10-6.5 8-21M24 18c.38 2.91-5.55 7.37-8 9-3 2-2.82 4.34-5 4-1.04-.94 1.41-3.04 0-3-1 0 .19 1.23-1 2-1 0-4.003 1-4-4 0-2 6-12 6-12s1.89-1.9 2-3.5c-.73-.994-.5-2-.5-3 1-1 3 2.5 3 2.5h2s .78-1.992 2.5-3c1 0 1 3 1 3z',
    b: 'M9 36c3.39-.97 10.11.43 13.5-2 3.39 2.43 10.11 1.03 13.5 2 0 0 1.65 .54 3 2-.68 .97-1.65 .99-3 .5-3.39-.97-10.11.46-13.5-1-3.39 1.46-10.11 .03-13.5 1-1.354 .49-2.323 .47-3-.5 1.354-1.94 3-2 3-2zM15 32c2.5 2.5 12.5 2.5 15 0 .5-1.5 0-2 0-2 0-2.5-2.5-4-2.5-4 5.5-1.5 6-11.5-5-15.5-11 4-10.5 14-5 15.5 0 0-2.5 1.5-2.5 4 0 0-.5 .5 0 2zM25 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 1 1 5 0z',
    q: 'M9 26c8.5-1.5 21-1.5 27 0l2-12-7 11V11l-5.5 13.5-3-15-3 15-5.5-14V25L7 14zM9 26c0 2 1.5 2 2.5 4 1 1.5 1 1 .5 3.5-1.5 1-1 2.5-1 2.5-1.5 1.5 0 2.5 0 2.5 6.5 1 16.5 1 23 0 0 0 1.5-1 0-2.5 0 0 .5-1.5-1-2.5-.5-2.5-.5-2 .5-3.5 1-2 2.5-2 2.5-4-8.5-1.5-18.5-1.5-27 0z',
    k: 'M22.5 11.63V6M20 8h5M22.5 25s4.5-7.5 3-10.5c0 0-1-2.5-3-2.5s-3 2.5-3 2.5c-1.5 3 3 10.5 3 10.5M11.5 37c5.5 3.5 15.5 3.5 21 0v-7s9-4.5 6-10.5c-4-6.5-13.5-3.5-16 4V27v-3.5c-3.5-7.5-13-10.5-16-4-3 6 5 10 5 10z'
  };

  const STROKE = '#5C6773'; // --fg-2 — same gray outline for both sides

  function piece(letter) {
    const isWhite = letter === letter.toUpperCase();
    const path = PATHS[letter.toLowerCase()];
    const fill = isWhite ? '#FFFFFF' : '#0B0F14';
    const stroke = STROKE;
    return `<svg viewBox="0 0 45 45">
      <path d="${path}" fill="${fill}" stroke="${stroke}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
  }

  const setup = [
    ['r','n','b','q','k','b','n','r'],
    ['p','p','p','p','p','p','p','p'],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['P','P','P','P','P','P','P','P'],
    ['R','N','B','Q','K','B','N','R'],
  ];

  const b = document.getElementById('b');
  for (let r=0;r<8;r++){
    for (let c=0;c<8;c++){
      const sq=document.createElement('div');
      sq.className='sq '+((r+c)%2===0?'l':'d');
      const idx=r*8+c;
      if (idx===37 || idx===45) sq.classList.add('hl');
      const p = setup[r][c];
      if (p) sq.innerHTML = piece(p);
      b.appendChild(sq);
    }
  }
</script>
</body></html>
