<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Transclude</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-0);font-family:var(--font-body);color:var(--fg-1)}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:10px}
  .transclude{position:relative;border:1px solid var(--line-1);border-left:2px solid var(--acc-violet);background:linear-gradient(90deg,rgba(124,58,237,.04),transparent 60%);margin:8px 0;border-radius:0 var(--r-2) var(--r-2) 0}
  .tx-head{display:flex;align-items:center;gap:8px;padding:6px 12px;font-family:var(--font-mono);font-size:12px;color:var(--fg-2);border-bottom:1px solid var(--line-1)}
  .tx-head .path{color:var(--acc-violet)}
  .tx-head .toggle{margin-left:auto;cursor:pointer;color:var(--fg-2)}
  .tx-body{padding:10px 12px}
  .tx-body p{margin:0;font-size:14px;line-height:1.55;color:var(--fg-1)}
  .collapsed .tx-body{display:none}
  .collapsed .tx-head{border-bottom:0}
  .summary{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);padding:0 12px 8px}
  code{background:var(--bg-3);padding:1px 5px;border-radius:2px;border:1px solid var(--line-1);font-family:var(--font-mono);font-size:.9em;color:var(--acc-violet)}
</style></head><body>
  <div class="label">// ::page{path=/notes/pin} — expanded</div>
  <div class="transclude">
    <div class="tx-head"><span>▾</span><span class="path">/notes/pin</span><span class="toggle">collapse</span></div>
    <div class="tx-body"><p>Pin&lt;P&gt; je o tom, že hodnota za tímto ukazatelem se v paměti nepohne. Důležité u <code>self-referential</code> typů a u <code>!Unpin</code> futures.</p></div>
  </div>
  <div class="label" style="margin-top:14px">// collapsed</div>
  <div class="transclude collapsed">
    <div class="tx-head"><span>▸</span><span class="path">/projects/cardano-validator</span><span class="toggle">expand</span></div>
    <div class="summary">3 sections · last edited 2025-09-01</div>
  </div>
</body></html>
