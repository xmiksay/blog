<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Tags & status pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-0);font-family:var(--font-body)}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:8px}
  .tag{display:inline-block;font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:var(--r-1);background:var(--bg-2);border:1px solid var(--line-1);color:var(--fg-1)}
  .tag.active{background:var(--acc-violet-bg);border-color:var(--acc-violet-bd);color:var(--acc-violet)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:var(--r-1);text-transform:uppercase;letter-spacing:.08em}
  .pill.live{background:var(--acc-red-bg);border:1px solid var(--acc-red-bd);color:var(--acc-red)}
  .pill.live::before{content:"";width:6px;height:6px;border-radius:999px;background:var(--acc-red);animation:pulse 1.4s infinite}
  .pill.ok{background:var(--acc-green-bg);border:1px solid var(--acc-green-bd);color:var(--acc-green)}
  .pill.draft{background:var(--bg-2);border:1px solid var(--line-1);color:var(--fg-2)}
  .pill.info{background:var(--acc-blue-bg);border:1px solid var(--acc-blue-bd);color:var(--acc-blue)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style></head><body>
  <div class="label">// tags (markdown post categories)</div>
  <div class="row">
    <span class="tag active">rust</span>
    <span class="tag">cardano</span>
    <span class="tag">linux</span>
    <span class="tag">šachy</span>
    <span class="tag">analog-foto</span>
    <span class="tag">guitar</span>
    <span class="tag">smart-contracts</span>
  </div>
  <div class="label">// status pills</div>
  <div class="row">
    <span class="pill live">REC</span>
    <span class="pill ok">PUBLISHED</span>
    <span class="pill draft">DRAFT</span>
    <span class="pill info">DRAFT · 12 changes</span>
  </div>
</body></html>
