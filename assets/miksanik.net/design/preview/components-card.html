<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-0);font-family:var(--font-body);display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{background:var(--bg-1);border:1px solid var(--line-1);border-radius:var(--r-2);padding:16px;position:relative;transition:border-color .15s var(--ease);box-shadow:0 1px 2px rgba(11,15,20,.04)}
  .card:hover{border-color:var(--line-2)}
  .card.brackets::before,.card.brackets::after,.card.brackets > .b1,.card.brackets > .b2{content:"";position:absolute;width:8px;height:8px;border:1px solid var(--acc-violet)}
  .card.brackets::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
  .card.brackets::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
  .card.brackets > .b1{top:-1px;right:-1px;border-left:none;border-bottom:none}
  .card.brackets > .b2{bottom:-1px;left:-1px;border-right:none;border-top:none}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  h3{margin:0 0 6px;font-family:var(--font-display);font-size:18px;color:var(--fg-0)}
  p{margin:0;color:var(--fg-1);font-size:14px;line-height:1.55}
</style></head><body>
  <div class="card">
    <div class="meta">2025-08-12 · rust</div>
    <h3>Pinning a samoreference</h3>
    <p>Proč Pin existuje a kdy ho potřebuješ — krátce a bez magie.</p>
  </div>
  <div class="card brackets">
    <span class="b1"></span><span class="b2"></span>
    <div class="meta" style="color:var(--acc-violet)">▸ featured · partie</div>
    <h3>Karjakin – Carlsen, 2016</h3>
    <p>Game 10 — když jeden tah obrátí celou matchovou strategii.</p>
  </div>
</body></html>
