<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Lines & traces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-0);font-family:var(--font-mono);color:var(--fg-1);display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .panel{border:1px solid var(--line-1);border-radius:var(--r-2);padding:16px;background:var(--bg-1)}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:12px}
  .stack{display:flex;flex-direction:column;gap:8px}
  .line{display:flex;align-items:center;gap:12px;font-size:11px}
  .swatch{width:120px;height:1px}
  .pcb{height:80px;background-color:var(--bg-0);background-image:radial-gradient(circle at 1px 1px,rgba(139,92,246,.18) 1px,transparent 1px),linear-gradient(to right,rgba(30,42,58,.5) 1px,transparent 1px),linear-gradient(to bottom,rgba(30,42,58,.5) 1px,transparent 1px);background-size:16px 16px;border-radius:var(--r-2);border:1px solid var(--line-1)}
</style></head><body>
  <div class="panel">
    <div class="label">// hairlines</div>
    <div class="stack">
      <div class="line"><div class="swatch" style="background:#1E2A3A;height:1px"></div><span>--line-1</span><span style="color:var(--fg-2);margin-left:auto">default border</span></div>
      <div class="line"><div class="swatch" style="background:#2A3A52;height:1px"></div><span>--line-2</span><span style="color:var(--fg-2);margin-left:auto">hover</span></div>
      <div class="line"><div class="swatch" style="background:#3B4F70;height:1px"></div><span>--line-3</span><span style="color:var(--fg-2);margin-left:auto">focus-ish</span></div>
      <div class="line"><div class="swatch" style="background:linear-gradient(90deg,transparent,#8B5CF6,transparent);height:1px"></div><span>scanline</span><span style="color:var(--fg-2);margin-left:auto">page mount</span></div>
    </div>
  </div>
  <div class="panel">
    <div class="label">// pcb grid bg</div>
    <div class="pcb"></div>
    <div style="font-size:11px;color:var(--fg-2);margin-top:8px">24×24 vias + traces · 4–8% opacity · used behind hero / 404</div>
  </div>
</body></html>
