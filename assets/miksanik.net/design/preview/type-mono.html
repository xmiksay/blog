<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Mono & code</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-0);color:var(--fg-0)}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:8px}
  .row{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
  .row > div{flex:1;min-width:240px}
  pre{margin:0}
  .eyebrow{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:6px}
  .kbd{font-family:var(--font-mono);font-size:12px;padding:2px 6px;border:1px solid var(--line-2);border-bottom-width:2px;border-radius:var(--r-1);background:var(--bg-2);color:var(--fg-0)}
</style></head><body>
  <div class="label">// mono · jetbrains mono</div>
  <div class="row">
    <div>
      <div class="eyebrow">// section label</div>
      <pre class="codeblock">fn main() {
    let x: u32 = 0xDEAD_BEEF;
    println!("{x:#x}");
}</pre>
    </div>
    <div>
      <div style="color:var(--fg-1);font-family:var(--font-mono);font-size:14px;line-height:1.6">
        inline <code style="background:var(--bg-3);padding:2px 6px;border-radius:2px;border:1px solid var(--line-1)">cargo run</code> · <span class="kbd">⌘K</span> <span class="kbd">/</span><br>
        <span style="color:var(--fg-2)">$ ./site_cli</span> create-user martin
      </div>
    </div>
  </div>
</body></html>
