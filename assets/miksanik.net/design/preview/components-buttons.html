<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-0);font-family:var(--font-body)}
  .row{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:8px}
  button,.btn{font-family:var(--font-body);font-size:14px;font-weight:500;padding:8px 16px;border-radius:var(--r-2);cursor:pointer;border:1px solid var(--line-1);background:var(--bg-1);color:var(--fg-0);transition:all .15s var(--ease)}
  .btn-primary{background:var(--acc-blue-bg);border-color:var(--acc-blue-bd);color:var(--acc-blue)}
  .btn-primary:hover{box-shadow:var(--halo-blue)}
  .btn-violet{background:var(--acc-violet-bg);border-color:var(--acc-violet-bd);color:var(--acc-violet)}
  .btn-danger{background:var(--acc-red-bg);border-color:var(--acc-red-bd);color:var(--acc-red)}
  .btn-ghost{background:transparent}
  .btn-ghost:hover{border-color:var(--line-2);background:var(--bg-1)}
  .btn-sm{padding:4px 10px;font-size:12px;font-family:var(--font-mono)}
  .btn-icon{padding:6px 8px;font-family:var(--font-mono)}
</style></head><body>
  <div class="label">// buttons</div>
  <div class="row">
    <button class="btn btn-primary">Save</button>
    <button class="btn btn-violet">Otevřít partii</button>
    <button class="btn">Cancel</button>
    <button class="btn btn-ghost">ghost</button>
    <button class="btn btn-danger">Delete</button>
  </div>
  <div class="row">
    <button class="btn btn-sm">B</button>
    <button class="btn btn-sm">I</button>
    <button class="btn btn-sm">H2</button>
    <button class="btn btn-sm">Link</button>
    <button class="btn btn-sm">Img</button>
    <button class="btn btn-sm">Code</button>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-left:8px">md-toolbar</span>
  </div>
  <div class="row">
    <button class="btn btn-icon">⏮</button>
    <button class="btn btn-icon">◀</button>
    <span style="font-family:var(--font-mono);font-size:13px;color:var(--fg-1);min-width:80px;text-align:center">12. Nf3</span>
    <button class="btn btn-icon">▶</button>
    <button class="btn btn-icon">⏭</button>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-left:8px">chess controls</span>
  </div>
</body></html>
