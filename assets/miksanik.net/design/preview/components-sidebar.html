<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Sidebar nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--bg-0);font-family:var(--font-body);display:flex;min-height:280px}
  .sidebar{width:240px;background:var(--dark-0);padding:16px 0;display:flex;flex-direction:column;position:relative;color:var(--dark-fg-0)}
  .sidebar::after{content:"";position:absolute;top:0;right:-1px;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,#7C3AED 30%,#7C3AED 70%,transparent);opacity:.7}
  .brand{padding:0 16px 16px;border-bottom:1px solid #1E2A3A;font-family:var(--font-display);font-weight:700;color:#E6EDF3;font-size:15px;letter-spacing:-.01em;display:flex;align-items:center;gap:10px}
  .brand img{width:28px;height:28px;object-fit:contain}
  .brand .tld{color:#7C3AED}
  ul{list-style:none;margin:0;padding:8px 0}
  li a{display:block;padding:6px 16px;color:#B6C2CF;font-family:var(--font-mono);font-size:13px;text-decoration:none;border:0;border-left:2px solid transparent}
  li a:hover{color:#E6EDF3;background:#0F151D}
  li.active a{color:#7C3AED;border-left-color:#7C3AED;background:#0F151D}
  .caret{color:#4A5563;font-size:10px;margin-right:6px}
  .sub a{padding-left:34px;color:#7B8794;font-size:12px}
  .footer{margin-top:auto;padding:12px 16px;border-top:1px solid #1E2A3A;font-family:var(--font-mono);font-size:11px;color:#7B8794}
  .pad{padding:24px;color:var(--fg-2);font-family:var(--font-mono);font-size:12px;background:var(--bg-0)}
</style></head><body>
  <aside class="sidebar">
    <div class="brand"><img src="../assets/logo.png" alt=""><span>miksanik<span class="tld">.net</span></span></div>
    <ul>
      <li><a><span class="caret">▸</span>Search</a></li>
      <li><a><span class="caret">▾</span>About</a></li>
      <li class="active"><a><span class="caret">▾</span>Partie</a>
        <ul class="sub"><li><a>2024 Tata Steel</a></li><li><a>Karjakin – Carlsen</a></li></ul>
      </li>
      <li><a><span class="caret">▸</span>Blog</a></li>
    </ul>
    <div class="footer">$ logged_out · v0.4.2</div>
  </aside>
  <div class="pad">// dark sidebar against light content<br>1px violet trace on the right edge</div>
</body></html>
