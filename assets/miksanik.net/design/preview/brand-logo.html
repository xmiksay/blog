<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-0);display:flex;align-items:center;justify-content:center;gap:32px;flex-wrap:wrap;min-height:200px}
  .card{display:flex;align-items:center;gap:14px;padding:14px 18px;border:1px solid var(--line-1);border-radius:var(--r-2);background:var(--bg-1)}
  .card.dark{background:var(--dark-0);border-color:#1E2A3A}
  .card.dark .wm{color:var(--dark-fg-0)}
  .wm{display:flex;align-items:center;gap:12px;font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:-0.01em;color:var(--fg-0)}
  .wm .tld{color:var(--acc-violet)}
  .wm .dot{color:var(--fg-2)}
  .card.dark .wm .dot{color:#7B8794}
  /* Logo mark — transparent PNG, no frame, no background panel */
  .mark{
    width:44px;height:44px;
    background-image:url("../assets/logo.png");
    background-size:contain;background-repeat:no-repeat;background-position:center;
    flex-shrink:0;
  }
  .mark.lg{width:72px;height:72px}
  .mark.xl{width:96px;height:96px}
  .label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-top:8px;text-align:center}
  .stack{display:flex;flex-direction:column;align-items:center;gap:0}
</style></head><body>
  <div class="stack">
    <div class="card">
      <div class="mark lg" aria-label="miksanik.net mark"></div>
      <div class="wm" style="font-size:26px">miksanik<span class="dot">.</span><span class="tld">net</span></div>
    </div>
    <div class="label">// primary lockup · light</div>
  </div>

  <div class="stack">
    <div class="card dark">
      <div class="mark" aria-label="miksanik.net mark"></div>
      <div class="wm">miksanik<span class="dot">.</span><span class="tld">net</span></div>
    </div>
    <div class="label">// sidebar lockup · dark</div>
  </div>

  <div class="stack">
    <div class="mark xl"></div>
    <div class="label">// avatar · 96px</div>
  </div>
</body></html>
