<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Image / Gallery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-0);font-family:var(--font-body);display:grid;grid-template-columns:1.2fr 1fr;gap:20px}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:10px}
  .figure{border:1px solid var(--line-1);border-radius:var(--r-2);overflow:hidden;background:var(--bg-1)}
  .figure .ph{height:140px;background:linear-gradient(135deg,#0F151D 0%,#1A2330 50%,#0F151D 100%);position:relative}
  .figure .ph::before{content:"35mm · Portra 400";position:absolute;left:8px;bottom:6px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
  .figure figcaption{padding:8px 12px;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);border-top:1px solid var(--line-1)}
  .gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .gallery-item{aspect-ratio:1;border:1px solid var(--line-1);border-radius:var(--r-1);background:linear-gradient(135deg,#0F151D,#1A2330)}
  .gallery-item:nth-child(2){background:linear-gradient(135deg,#131A24,#0F151D)}
  .gallery-item:nth-child(3){background:linear-gradient(135deg,#1A2330,#131A24)}
  .gallery-item:nth-child(4){background:linear-gradient(135deg,#0E141C,#1A2330)}
  .gallery-item:nth-child(5){background:linear-gradient(135deg,#1A2330,#0E141C)}
  .gallery-item:nth-child(6){background:linear-gradient(135deg,#131A24,#1A2330)}
</style></head><body>
  <div>
    <div class="label">// ::img · single figure</div>
    <figure class="figure"><div class="ph"></div><figcaption>Praha · listopad · Portra 400</figcaption></figure>
  </div>
  <div>
    <div class="label">// ::gallery · 3-up grid</div>
    <div class="gallery-grid">
      <div class="gallery-item"></div><div class="gallery-item"></div><div class="gallery-item"></div>
      <div class="gallery-item"></div><div class="gallery-item"></div><div class="gallery-item"></div>
    </div>
  </div>
</body></html>
