<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Editor</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:var(--bg-0);font-family:var(--font-body)}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:8px}
  .toolbar{display:flex;gap:6px;padding:6px;background:var(--bg-2);border:1px solid var(--line-1);border-bottom:0;border-radius:var(--r-2) var(--r-2) 0 0}
  .toolbar button{background:var(--bg-1);border:1px solid var(--line-1);color:var(--fg-1);font-family:var(--font-mono);font-size:12px;padding:4px 10px;border-radius:var(--r-1);cursor:pointer}
  .toolbar button:hover{border-color:var(--line-2);color:var(--fg-0)}
  .toolbar .spacer{flex:1}
  .toolbar .preview-toggle{color:var(--acc-blue);border-color:var(--acc-blue-bd);background:var(--acc-blue-bg)}
  textarea{width:100%;background:var(--bg-3);border:1px solid var(--line-1);border-top:0;color:var(--fg-0);font-family:var(--font-mono);font-size:13px;line-height:1.6;padding:12px;resize:vertical;min-height:140px;outline:none;border-radius:0 0 var(--r-2) var(--r-2)}
  textarea:focus{border-color:var(--acc-blue)}
</style></head><body>
  <div class="label">// markdown editor — drop-in for existing `.md-toolbar` + `#markdown`</div>
  <div class="toolbar">
    <button>B</button><button>I</button><button>H2</button><button>H3</button><button>Link</button><button>Img</button><button>Code</button>
    <span class="spacer"></span>
    <button class="preview-toggle">Preview</button>
  </div>
  <textarea>## Pinning a samoreference

::page{path=/notes/futures-101}

`Pin&lt;P&gt;` znamená, že hodnota za **P** se v paměti nepohne.

::pgn{src=karjakin-carlsen-2016.pgn}

::gallery{path=/photos/2024-praha}</textarea>
</body></html>
