<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Colors — base</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-0);font-family:var(--font-mono);color:var(--fg-1)}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
  .sw{border:1px solid var(--line-1);border-radius:var(--r-2);padding:10px;display:flex;flex-direction:column;gap:6px;min-height:100px;background:var(--bg-1)}
  .chip{height:48px;border-radius:var(--r-1);border:1px solid var(--line-1)}
  .name{font-size:11px;color:var(--fg-0);font-weight:600}
  .hex{font-size:10px;color:var(--fg-2)}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);margin-bottom:8px}
</style></head><body>
  <div class="label">// surface (light) + dark sidebar tokens</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FAFBFC"></div><div class="name">--bg-0</div><div class="hex">#FAFBFC</div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">--bg-1</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:#F2F4F7"></div><div class="name">--bg-2</div><div class="hex">#F2F4F7</div></div>
    <div class="sw"><div class="chip" style="background:#ECEFF3"></div><div class="name">--bg-3</div><div class="hex">#ECEFF3</div></div>
    <div class="sw"><div class="chip" style="background:#07090C;border-color:#1E2A3A"></div><div class="name">--dark-0</div><div class="hex">#07090C</div></div>
    <div class="sw"><div class="chip" style="background:#0B0F14"></div><div class="name">--fg-0</div><div class="hex">#0B0F14</div></div>
    <div class="sw"><div class="chip" style="background:#5C6773"></div><div class="name">--fg-2</div><div class="hex">#5C6773</div></div>
  </div>
</body></html>
