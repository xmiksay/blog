<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Radii & Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); display:flex; gap:24px; align-items:center; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width:80px; height:60px; background:var(--white); border:1px solid var(--border-1); }
  .label { font:var(--type-caption); color:var(--fg-2); letter-spacing:.04em; }
  .sm { box-shadow:var(--shadow-sm); border:0; }
  .md { box-shadow:var(--shadow-md); border:0; }
  .lg { box-shadow:var(--shadow-lg); border:0; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:2px"></div><div class="label">RADIUS-SM · 2</div></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="label">RADIUS-MD · 4</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="label">RADIUS-LG · 8</div></div>
  <div style="width:1px;height:60px;background:var(--border-1)"></div>
  <div class="item"><div class="box sm" style="border-radius:4px"></div><div class="label">SHADOW-SM</div></div>
  <div class="item"><div class="box md" style="border-radius:4px"></div><div class="label">SHADOW-MD</div></div>
  <div class="item"><div class="box lg" style="border-radius:4px"></div><div class="label">SHADOW-LG</div></div>
</body>
</html>
