<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Spacing · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); }
  .row { display:flex; align-items:center; gap:14px; padding:6px 0; }
  .name { font:var(--type-mono); font-size:12px; width:64px; color:var(--fg-2); }
  .bar { background:var(--ink); height:14px; border-radius:1px; }
  .px { font:var(--type-caption); color:var(--fg-3); margin-left:8px; }
</style>
</head>
<body>
  <div class="row"><span class="name">--s-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="row"><span class="name">--s-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="row"><span class="name">--s-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="row"><span class="name">--s-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
  <div class="row"><span class="name">--s-5</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="row"><span class="name">--s-6</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
  <div class="row"><span class="name">--s-7</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
  <div class="row"><span class="name">--s-8</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
</body>
</html>
