<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Colors · Core</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); display:flex; gap:14px; flex-wrap:wrap; }
  .sw { width:140px; }
  .chip { width:140px; height:80px; border-radius:var(--radius-md); border:1px solid var(--border-1); }
  .name { font:var(--type-ui); margin-top:8px; color:var(--fg-1); }
  .hex { font:var(--type-mono); color:var(--fg-2); margin-top:2px; font-size:11px; }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background:#111111"></div><div class="name">Ink</div><div class="hex">#111111</div></div>
  <div class="sw"><div class="chip" style="background:#F7F4EC"></div><div class="name">Paper</div><div class="hex">#F7F4EC</div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">White</div><div class="hex">#FFFFFF</div></div>
  <div class="sw"><div class="chip" style="background:#7A1F2B"></div><div class="name">Accent</div><div class="hex">#7A1F2B</div></div>
  <div class="sw"><div class="chip" style="background:#5A1620"></div><div class="name">Accent dark</div><div class="hex">#5A1620</div></div>
  <div class="sw"><div class="chip" style="background:#F4E5E7"></div><div class="name">Accent soft</div><div class="hex">#F4E5E7</div></div>
</body>
</html>
