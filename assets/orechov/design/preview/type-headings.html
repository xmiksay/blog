<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Type · Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--bg-page); }
  h1,h2,h3,h4 { margin:0; }
  .row { display:flex; align-items:baseline; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border-1); }
  .row:last-child { border-bottom:0; }
  .meta { font:var(--type-caption); color:var(--fg-2); letter-spacing:.04em; }
</style>
</head>
<body>
  <div class="row"><h1>Rozbor partie</h1><span class="meta">H1 · SERIF 700 · 36</span></div>
  <div class="row"><h2>Soutěže a aktivity</h2><span class="meta">H2 · SERIF 600 · 28</span></div>
  <div class="row"><h3>Tréninkový plán</h3><span class="meta">H3 · SERIF 600 · 22</span></div>
  <div class="row"><h4>Členové klubu</h4><span class="meta">H4 · SANS 600 · 18</span></div>
</body>
</html>
