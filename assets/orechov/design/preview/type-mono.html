<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Type · Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); }
  .notation { font:var(--type-mono); font-size:16px; line-height:1.7; color:var(--fg-1); background:var(--bg-surface-2); padding:14px 18px; border-radius:var(--radius-md); border:1px solid var(--border-1); }
  .meta { font:var(--type-caption); color:var(--fg-2); margin-top:10px; letter-spacing:.04em; }
  .num { color:var(--fg-3); }
</style>
</head>
<body>
  <div class="notation">
    <span class="num">1.</span> e4 e5 &nbsp; <span class="num">2.</span> Nf3 Nc6 &nbsp; <span class="num">3.</span> Bb5 a6 <br>
    <span class="num">4.</span> Ba4 Nf6 &nbsp; <span class="num">5.</span> O-O Be7 &nbsp; <span class="num">6.</span> Re1 b5
  </div>
  <div class="meta">JETBRAINS MONO · 400 · ALGEBRAIC NOTATION · CHESS COLUMNS, MOVE LOGS</div>
</body>
</html>
