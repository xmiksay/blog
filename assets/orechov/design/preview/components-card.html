<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Components · Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  .card { background:var(--white); border-radius:var(--radius-md); padding:20px 22px; box-shadow:var(--shadow-sm); }
  .card h3 { font:var(--type-h3); font-size:18px; margin:0 0 6px; }
  .card .meta { font:var(--type-caption); color:var(--fg-3); letter-spacing:.04em; text-transform:uppercase; margin-bottom:10px; }
  .card p { font:var(--type-body-sm); color:var(--fg-2); margin:0; }
  .card a { font:var(--type-ui); font-size:13px; color:var(--accent); margin-top:14px; display:inline-block; }
  .article-card { border-left:3px solid var(--accent); padding-left:18px; }
</style>
</head>
<body>
  <div class="card article-card">
    <h3><a href="#" style="color:inherit;border:0">Rozbor partie</a></h3>
    <div class="meta">Miksa · 8. 4. 2026</div>
    <p>Přehledná analýza obrany dvou jezdců, kterou jsme rozebírali na posledním tréninku v klubovně.</p>
    <a href="#">Číst dále →</a>
  </div>
  <div class="card">
    <h3>Turnaj o pohár starosty</h3>
    <div class="meta">Sobota · 10:00 · Sokolovna</div>
    <p>Otevřený turnaj pro členy i hosty. Tempem 15 + 5, sedm kol švýcarským systémem.</p>
    <a href="#">Přihlásit se →</a>
  </div>
</body>
</html>
