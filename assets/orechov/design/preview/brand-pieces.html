<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Brand · Pieces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); }
  .row { display:flex; gap:20px; align-items:flex-end; color:var(--ink); }
  .piece { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .piece img { width:64px; height:64px; }
  .piece span { font:var(--type-caption); color:var(--fg-2); letter-spacing:.04em; text-transform:uppercase; }
  .piece.hero img { width:88px; height:88px; }
  .piece.hero span { color:var(--accent); font-weight:600; }
</style>
</head>
<body>
  <div class="row">
    <div class="piece hero"><img src="../assets/pieces/knight.svg"><span>Jezdec</span></div>
    <div class="piece"><img src="../assets/pieces/king.svg"><span>Král</span></div>
    <div class="piece"><img src="../assets/pieces/queen.svg"><span>Dáma</span></div>
    <div class="piece"><img src="../assets/pieces/rook.svg"><span>Věž</span></div>
    <div class="piece"><img src="../assets/pieces/bishop.svg"><span>Střelec</span></div>
    <div class="piece"><img src="../assets/pieces/pawn.svg"><span>Pěšec</span></div>
  </div>
</body>
</html>
