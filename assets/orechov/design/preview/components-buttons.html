<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Components · Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  .btn { font:var(--type-ui); font-size:14px; padding:10px 20px; border-radius:var(--radius-md); border:1px solid transparent; cursor:pointer; transition:all var(--dur-fast) var(--ease); }
  .btn-primary { background:var(--accent); color:var(--white); }
  .btn-primary:hover { background:var(--accent-dark); }
  .btn-secondary { background:transparent; color:var(--ink); border-color:var(--ink); }
  .btn-secondary:hover { background:var(--ink-5); }
  .btn-ghost { background:transparent; color:var(--ink); }
  .btn-ghost:hover { background:var(--ink-5); }
  .btn-link { background:transparent; color:var(--accent); padding:10px 0; border-bottom:1px solid transparent; border-radius:0; }
  .btn-link:hover { border-bottom-color:var(--accent-dark); color:var(--accent-dark); }
  .btn-disabled { background:var(--ink-15); color:var(--fg-3); cursor:not-allowed; }
</style>
</head>
<body>
  <button class="btn btn-primary">Přihlásit</button>
  <button class="btn btn-secondary">Zrušit</button>
  <button class="btn btn-ghost">Zpět</button>
  <button class="btn btn-link">Více informací →</button>
  <button class="btn btn-disabled" disabled>Odeslat</button>
</body>
</html>
