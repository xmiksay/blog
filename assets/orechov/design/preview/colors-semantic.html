<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Colors · Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); display:grid; grid-template-columns:repeat(2,1fr); gap:14px 24px; }
  .item { display:flex; align-items:center; gap:14px; }
  .dot { width:36px; height:36px; border-radius:50%; border:1px solid var(--border-1); flex-shrink:0; }
  .name { font:var(--type-ui); }
  .desc { font:var(--type-caption); color:var(--fg-2); margin-top:2px; }
</style>
</head>
<body>
  <div class="item"><div class="dot" style="background:#111"></div><div><div class="name">--fg-1</div><div class="desc">Primary text</div></div></div>
  <div class="item"><div class="dot" style="background:#5C564B"></div><div><div class="name">--fg-2</div><div class="desc">Secondary text</div></div></div>
  <div class="item"><div class="dot" style="background:#8A8474"></div><div><div class="name">--fg-3</div><div class="desc">Tertiary, captions</div></div></div>
  <div class="item"><div class="dot" style="background:#7A1F2B"></div><div><div class="name">--fg-link</div><div class="desc">Links · primary CTA</div></div></div>
  <div class="item"><div class="dot" style="background:#F7F4EC"></div><div><div class="name">--bg-page</div><div class="desc">Page background</div></div></div>
  <div class="item"><div class="dot" style="background:#FFFFFF"></div><div><div class="name">--bg-surface</div><div class="desc">Cards, header</div></div></div>
  <div class="item"><div class="dot" style="background:#E8E2D4"></div><div><div class="name">--border-1</div><div class="desc">Dividers · 1px</div></div></div>
  <div class="item"><div class="dot" style="background:#F4E5E7"></div><div><div class="name">--bg-accent-soft</div><div class="desc">Callouts, washes</div></div></div>
</body>
</html>
