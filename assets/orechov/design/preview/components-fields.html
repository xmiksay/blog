<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Components · Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); display:grid; grid-template-columns:repeat(2,1fr); gap:14px 20px; align-items:start; }
  .field { display:flex; flex-direction:column; gap:6px; }
  label { font:var(--type-ui); font-size:12px; letter-spacing:.04em; text-transform:uppercase; color:var(--fg-2); }
  input, select, textarea { font:var(--type-body-sm); padding:10px 12px; border:1px solid var(--border-1); background:var(--white); border-radius:var(--radius-sm); color:var(--fg-1); outline:none; }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--bg-accent-soft); }
  .err input { border-color:var(--accent); }
  .err-msg { font:var(--type-caption); color:var(--accent); }
  .check { display:flex; align-items:center; gap:8px; font:var(--type-body-sm); }
  .check input { width:16px; height:16px; accent-color:var(--accent); }
</style>
</head>
<body>
  <div class="field"><label>Jméno</label><input value="Jan Novák"></div>
  <div class="field"><label>E-mail</label><input value="jan@orechov.cz" autofocus></div>
  <div class="field err"><label>ELO</label><input value="abc"><span class="err-msg">Zadejte číslo</span></div>
  <div class="field"><label>Klub</label><select><option>Bíločerný Ořechov</option></select></div>
  <label class="check"><input type="checkbox" checked> Souhlasím s pravidly turnaje</label>
  <label class="check"><input type="checkbox"> Přihlásit k odběru novinek</label>
</body>
</html>
