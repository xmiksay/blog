<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Components · Header</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background:var(--bg-page); }
  .header { height:64px; background:var(--white); border-bottom:1px solid var(--border-1); display:flex; align-items:center; padding:0 24px; gap:24px; }
  .logo { display:flex; align-items:center; gap:10px; color:var(--ink); }
  .logo svg, .logo img { height:32px; }
  .logo .text { font:var(--type-h4); font-family:var(--font-serif); font-weight:700; font-size:18px; }
  .logo .sub { font:var(--type-caption); color:var(--accent); letter-spacing:.18em; font-size:9px; margin-top:2px; }
  .spacer { flex:1; }
  .nav { display:flex; gap:24px; font:var(--type-ui); }
  .nav a { color:var(--fg-1); text-decoration:none; }
  .nav a.active { color:var(--accent); font-weight:600; }
  .login { font:var(--type-ui); padding:8px 14px; border:1px solid var(--ink); border-radius:var(--radius-md); color:var(--ink); }
  .below { padding:14px 24px; font:var(--type-caption); color:var(--fg-2); letter-spacing:.04em; }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="../assets/pieces/knight.svg" style="color:var(--ink);width:32px;height:32px">
      <div>
        <div class="text">Bíločerný</div>
        <div class="sub">OŘECHOV · ŠACHOVÝ KLUB</div>
      </div>
    </div>
    <div class="spacer"></div>
    <nav class="nav">
      <a href="#" class="active">Články</a>
      <a href="#">O nás</a>
      <a href="#">Turnaje</a>
      <a href="#">Kontakt</a>
    </nav>
    <a href="#" class="login">Přihlásit</a>
  </div>
  <div class="below">TOP HEADER · 64PX · WHITE SURFACE · 1PX BOTTOM RULE · KNIGHT GLYPH AS BRAND</div>
</body>
</html>
