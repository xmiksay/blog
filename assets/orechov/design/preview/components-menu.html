<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Components · Menu items</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-page); }
  .menu { width:240px; background:var(--bg-page); }
  .group { font:var(--type-caption); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-3); padding:10px 16px 6px; }
  .item { display:flex; align-items:center; gap:10px; padding:9px 16px; font:var(--type-ui); color:var(--fg-1); border-left:3px solid transparent; cursor:pointer; transition:background var(--dur-fast) var(--ease); }
  .item:hover { background:var(--ink-5); }
  .item.active { border-left-color:var(--accent); color:var(--accent); font-weight:600; background:var(--bg-accent-soft); }
  .item .chev { margin-left:auto; color:var(--fg-3); }
  .sub { padding-left:34px; font-size:13px; color:var(--fg-2); }
  .sub.active { color:var(--accent); font-weight:600; }
</style>
</head>
<body>
  <div class="menu">
    <div class="group">Klub</div>
    <div class="item">O nás</div>
    <div class="item">Členové</div>
    <div class="group">Hra</div>
    <div class="item active">Články<span class="chev">▾</span></div>
    <div class="item sub">Rozbory partií</div>
    <div class="item sub active">Turnajové reporty</div>
    <div class="item">Turnaje</div>
  </div>
</body>
</html>
