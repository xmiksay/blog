<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Colors · Ink scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); }
  .row { display:flex; gap:0; }
  .sw { flex:1; height:88px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; box-sizing:border-box; }
  .name { font:var(--type-caption); font-size:11px; letter-spacing:.04em; }
  .hex { font:var(--type-mono); font-size:10px; opacity:.85; }
  .label { display:flex; gap:0; margin-top:8px; }
  .label > div { flex:1; font:var(--type-caption); color:var(--fg-2); padding:0 10px; font-size:10px; }
</style>
</head>
<body>
  <div class="row" style="border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-1)">
    <div class="sw" style="background:#111111;color:#fff"><div class="name">INK</div><div class="hex">#111</div></div>
    <div class="sw" style="background:#1F1F1F;color:#fff"><div class="name">INK 90</div><div class="hex">#1F1F1F</div></div>
    <div class="sw" style="background:#3D3A35;color:#fff"><div class="name">INK 70</div><div class="hex">#3D3A35</div></div>
    <div class="sw" style="background:#5C564B;color:#fff"><div class="name">INK 50</div><div class="hex">#5C564B</div></div>
    <div class="sw" style="background:#8A8474;color:#fff"><div class="name">INK 30</div><div class="hex">#8A8474</div></div>
    <div class="sw" style="background:#C9C2B2;color:#111"><div class="name">INK 15</div><div class="hex">#C9C2B2</div></div>
    <div class="sw" style="background:#E8E2D4;color:#111"><div class="name">RULE</div><div class="hex">#E8E2D4</div></div>
  </div>
</body>
</html>
